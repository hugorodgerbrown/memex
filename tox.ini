# Tox drives the CI checks: tests, lint, format, and types.
#
# Requires the tox-uv plugin so each environment is provisioned from uv.lock
# (the same resolution `uv sync` produces locally). Run everything with:
#
#     uvx --with tox-uv tox
#
# or a single check with `tox -e lint`, `tox -e format`, etc.
[tox]
env_list = format, lint, type, py314
# tox-uv: build every env from the lockfile instead of pip.
runner = uv-venv-lock-runner

[testenv]
# The project requires Python >=3.14, so every env (not just py314) must use it;
# tox-uv fetches the interpreter when the runner lacks it.
base_python = python3.14
# Install the project plus its dev dependency group (pytest, ruff, mypy, stubs).
dependency_groups = dev

[testenv:py314]
description = Run the test suite.
commands = pytest {posargs}

[testenv:lint]
description = Lint with ruff.
commands = ruff check {posargs:.}

[testenv:format]
description = Check formatting with ruff (no changes applied).
commands = ruff format --check {posargs:.}

[testenv:type]
description = Type-check with mypy.
commands = mypy {posargs}
